<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Vendas</title>
    <style>
        body { font-family: sans-serif; background-color: #f4f4f4; padding: 10px; margin: 0; }
        .container { background: white; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); max-width: 600px; margin: auto; }
        h2 { text-align: center; color: #333; margin-top: 0; }
        table { width: 100%; border-collapse: collapse; margin-bottom: 20px; }
        th, td { border: 1px solid #ccc; padding: 10px; text-align: left; }
        th { background-color: #eee; }
        input[type="number"] { width: 60px; padding: 5px; font-size: 16px; border: 1px solid #ddd; border-radius: 4px; }
        .vlr-col { color: #555; font-size: 0.9em; }
        .total-row { font-weight: bold; background: #e9ecef; }
        .total-cell { color: #28a745; font-weight: bold; }
        
        .acoes { display: flex; gap: 10px; flex-direction: column; }
        button { width: 100%; padding: 15px; border: none; border-radius: 4px; font-size: 16px; font-weight: bold; cursor: pointer; }
        .btn-limpar { background: #dc3545; color: white; }
        .btn-pdf { background: #28a745; color: white; }

        /* CONFIGURAÇÃO PARA O PDF (IMPRESSÃO) */
        @media print {
            body { background: white; padding: 0; }
            .container { box-shadow: none; max-width: 100%; }
            .acoes, .btn-limpar, .btn-pdf, input { display: none; } /* Esconde botões e campos de entrada */
            .qtd-text { display: inline !important; } /* Mostra o número digitado no PDF */
            th, td { padding: 8px; font-size: 12px; }
        }
        .qtd-text { display: none; } /* Esconde o texto da quantidade na tela normal */
    </style>
</head>
<body>

<div class="container">
    <h2 id="titulo">Relatório de Vendas</h2>
    <table>
        <thead>
            <tr>
                <th>ITEM</th>
                <th>QTD.</th>
                <th>VLR. (R$)</th>
                <th>TOTAL</th>
            </tr>
        </thead>
        <tbody id="tabela-corpo"></tbody>
        <tfoot>
            <tr class="total-row">
                <td colspan="3" style="text-align: right;">TOTAL GERAL:</td>
                <td id="soma-total" class="total-cell">R$ 0,00</td>
            </tr>
        </tfoot>
    </table>

    <div class="acoes">
        <button class="btn-pdf" onclick="gerarPDF()">GERAR PDF / IMPRIMIR</button>
        <button class="btn-limpar" onclick="limparTudo()">LIMPAR TUDO</button>
    </div>
</div>

<script>
    const itens = [
        { nome: "LOTE A", valor: 89.99 },
        { nome: "LOTE B", valor: 99.99 },
        { nome: "LOTE C", valor: 109.99 },
        { nome: "LOTE D", valor: 119.99 },
        { nome: "VALOR NORMAL", valor: 129.99 },
        { nome: "ENTRA 5 PG 4", valor: 519.96 },
        { nome: "ENTRA 10 PG 7", valor: 999.99 },
        { nome: "COPO", valor: 7.99 }
    ];

    function renderizarTabela() {
        const corpo = document.getElementById('tabela-corpo');
        corpo.innerHTML = itens.map((item, index) => `
            <tr>
                <td><strong>${item.nome}</strong></td>
                <td>
                    <input type="number" id="qtd-${index}" min="0" placeholder="0" oninput="atualizarTexto(${index}); calcular()">
                    <span id="text-qtd-${index}" class="qtd-text">0</span>
                </td>
                <td class="vlr-col">${item.valor.toLocaleString('pt-BR', { minimumFractionDigits: 2 })}</td>
                <td id="total-${index}">R$ 0,00</td>
            </tr>
        `).join('');
    }

    // Função para que o número apareça no PDF (já que o campo input some)
    function atualizarTexto(index) {
        const qtd = document.getElementById(`qtd-${index}`).value || 0;
        document.getElementById(`text-qtd-${index}`).innerText = qtd;
    }

    function calcular() {
        let somaGeral = 0;
        itens.forEach((item, index) => {
            const qtd = document.getElementById(`qtd-${index}`).value || 0;
            const totalItem = qtd * item.valor;
            somaGeral += totalItem;
            document.getElementById(`total-${index}`).innerText = 
                totalItem.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
        });
        document.getElementById('soma-total').innerText = 
            somaGeral.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
    }

    function limparTudo() {
        if(confirm("Deseja limpar todos os campos?")) {
            const inputs = document.querySelectorAll('input');
            inputs.forEach((input, index) => {
                input.value = "";
                document.getElementById(`text-qtd-${index}`).innerText = "0";
            });
            calcular();
        }
    }

    function gerarPDF() {
        window.print(); // Abre a função de salvar como PDF ou imprimir
    }

    renderizarTabela();
</script>

</body>
</html>
